# Default parameters for src/reconstruction/run_colmap_experiment.py
# Every run can override these via CLI flags; whatever was actually used
# gets written into config/experiments.yaml automatically.

image_selection:
  num_images: 15
  method: even   # even | random
  # "even" sorts images by capture time (EXIF DateTimeOriginal, falls back to
  # filename) and picks evenly spaced ones. Photos of one object are usually
  # taken while walking around it, so this gives spread-out viewing angles
  # without needing real pose/angle data.
  seed: 42       # only used when method: random

camera:
  camera_model: SIMPLE_RADIAL
  single_camera: true

features:
  type: SIFT

matching:
  method: sequential   # sequential | exhaustive
  # "sequential" matches each image mainly against its neighbors in the
  # selected order - a good fit with "even" selection, since neighbors in
  # that order are also neighbors in viewing angle.

mapper:
  type: INCREMENTAL

dense:
  max_image_size: 3024
  cache_size: 1.0
  num_threads: 16
  # Patch match stereo itself is GPU-bound (this just governs CPU-side
  # workspace/cache handling), but stereo fusion is genuinely multi-threaded
  # across images - num_threads: 1 was leaving free speedup on the table
  # (e.g. the rented pod has 256 CPU threads sitting idle). 16 is a cautious
  # first bump, not maxed out, since cache_size may scale per-thread and
  # untested at higher counts - raise further if it helps without memory
  # issues.
  gpu_index: "0,0,0,0"
  # Repeating the same GPU index runs multiple PatchMatchStereo workers
  # concurrently on that one physical GPU (pycolmap's own documented
  # multi-GPU mechanism, "0,1,2,3" for actual separate GPUs - repeating "0"
  # instead targets one GPU with spare capacity). Confirmed real headroom
  # here: a single worker only used ~1.1GB of this pod's 24GB VRAM at 98%
  # reported compute utilization, which just means some kernel was running,
  # not that all parallel execution units were saturated. 4 workers is a
  # first test, not verified to scale linearly - COLMAP's docs mention this
  # trick but don't promise a specific speedup; watch fusion/VRAM afterward.
  geom_consistency: true
  # Dense reconstruction (patch match stereo) needs a CUDA-enabled COLMAP/
  # pycolmap build. The script detects this automatically and skips the
  # dense stage with a note in the log if CUDA isn't available.
