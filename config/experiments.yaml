experiments:
  exp_001:
    object_id: bollard_001
    method: colmap
    image_subset: all (39)
    image_dir: data/raw/bollard_001/images/jpg
    output_dir: outputs/exp_001_colmap_bollard_001
    command: >
      colmap automatic_reconstructor
      --workspace_path outputs/exp_001_colmap_bollard_001
      --image_path data/raw/bollard_001/images/jpg
    parameters:
      quality: default
      data_type: default
      single_camera: default
      dense: default
      camera_model: default
      feature: default
      mapper: default
    notes:
      - Only sparse reconstruction
    log:
      - Registered images: 39/39 = enough overlap
      - Points in sparse reconstruction: 44620
      - Observations: 267341 - how many time a feature point was observed in different images
      - Mean track length: 5.991506 - how many images on average a feature point was observed in
      - Mean observations per image: 6854.897436
      - Mean reprojection error: 1.158444px - difference between the observed feature point and the projected 3D point in the image


  exp_002:
    object_id: bollard_001
    method: colmap
    image_subset: all (39)
    image_dir: data/raw/bollard_001/images/jpg
    output_dir: outputs/exp_002_colmap_bollard_001
    command: >
      colmap automatic_reconstructor
      --workspace_path outputs/exp_002_colmap_bollard_001
      --image_path data/raw/bollard_001/images/jpg
      --quality EXTREME
      --data_type INDIVIDUAL
      --single_camera 1
      --dense 1
      --camera_model SIMPLE_RADIAL
      --feature SIFT
      --mapper INCREMENTAL
    parameters:
      quality: EXTREME
      data_type: INDIVIDUAL
      single_camera: true
      dense: true
      camera_model: SIMPLE_RADIAL
      feature: SIFT
      mapper: INCREMENTAL
    notes:
      - Sparse reconstruction, dense is only available with CUDA
      - Incremental mapper
      - Extreme quality

  exp_003:
    object_id: bollard_001
    method: colmap
    image_subset: all (39)
    image_dir: /content/drive/MyDrive/diploma_data/raw/bollard_001/images/jpg
    output_dir: /content/drive/MyDrive/diploma_outputs/exp_003_colmap_bollard_001 and outputs/exp_003_colmap_bollard_001
    notes:
      - Check parameters in python code - they are differenct for the stages
      - GPU is required for dense reconstruction
      - Run very slowly (more than 5h, needs the improvements)
      - Dense maps required more 12Gb RAM (initially there were 39 photos up to 5Mb each)
      - As a result, bollard hasn't been reconstructed fully 
    next step:
    - Better geometry / less photos (up to 20 for each object) / more angles
    - Masks / bounding box for MVS (for RAM)

  exp_004:
    object_id: bollard_001
    method: mast3r
    image_subset: some (12 random)
    image_dir: data/raw/bollard_001/images/jpg
    output_dir: outputs/exp_004_mast3r_bollard_001
    parameters:
        model:
          weights: "checkpoints/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth"
          device: "cpu"
          image_size: 512
        alignment:
          coarse_lr: 0.07
          coarse_iterations: 300
          fine_lr: 0.01
          fine_iterations: 300
          opt_level: "refine+depth"
        matching:
          matching_confidence_threshold: 0
          shared_intrinsics: true
          scenegraph: "complete"
        export:
          min_conf_threshold: 1.5
          cam_size: 0.2
          tsdf_threshold: 0
          as_pointcloud: true
          mask_sky: false
          cleanup_depthmaps: true
          transparent_cameras: false
    notes:
      - GPU is not required
      - Run for 40 min 
      - PC needs to be converted from glb to ply
      - Dense reconstruction

  exp_005:
    date: 2026-07-04
    object_id: bollard_001
    method: colmap
    image_subset: 15 selected (even), 15 registered
    image_dir: data/raw/bollard_001/images/jpg
    output_dir: outputs/exp_005_colmap_bollard_001
    parameters:
      camera_model: SIMPLE_RADIAL
      single_camera: true
      feature: SIFT
      matching: sequential
      mapper: INCREMENTAL
      dense_max_image_size: 3024
    log:
      - Registered images: 15/15
      - Points in sparse reconstruction: 9798
      - Observations: 41843
      - Mean track length: 4.270565
      - Mean observations per image: 2789.533333
      - Mean reprojection error: 1.074251px
      - Dense fused point cloud: 696713 points

  exp_006:
    date: 2026-07-04
    object_id: bollard_001
    method: mast3r_sfm
    image_subset: 15 selected (even)
    image_dir: data/raw/bollard_001/images/jpg
    output_dir: outputs/exp_006_mast3r_sfm_bollard_001
    parameters:
      device: cuda
      image_size: 512
      scenegraph: complete
      shared_intrinsics: true
      dense_matching: false
      conf_thr: 1.001
      mapper: incremental
    log:
      - Registered images: 15/15
      - Points in reconstruction: 31289
      - Observations: 132592
      - Mean track length: 4.237655
      - Mean reprojection error: 1.572925px
      - Point cloud: outputs/exp_006_mast3r_sfm_bollard_001/exp_006_mast3r_sfm_bollard_001.ply
