  exp_010:
    date: 2026-07-05
    object_id: bollard_001_video
    method: colmap
    image_subset: 53 selected (even)
    image_dir: data/raw/bollard_001_video/images/jpg
    output_dir: outputs/exp_010_colmap_bollard_001_video_l40s
